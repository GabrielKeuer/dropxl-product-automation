name: Daglig Produkt Sletning

on:
  schedule:
    - cron: '0 4 * * *'  # Kl. 04:00 UTC (05:00 dansk sommertid, 06:00 vintertid)
  workflow_dispatch:  # Manuel trigger fra GitHub UI

jobs:
  # ============================================================
  # JOB 1: Analyser og generer slettefil
  # ============================================================
  analyze:
    runs-on: ubuntu-latest
    outputs:
      delete_count: ${{ steps.run_script.outputs.delete_count }}
      needs_approval: ${{ steps.run_script.outputs.needs_approval }}
      feed_count: ${{ steps.run_script.outputs.feed_count }}
      shopify_count: ${{ steps.run_script.outputs.shopify_count }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer dependencies
        run: pip install pandas requests openpyxl

      - name: Kør slette-analyse
        id: run_script
        env:
          FEED_URL: ${{ vars.FEED_URL }}
          SHOPIFY_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          DELETE_THRESHOLD: ${{ vars.DELETE_THRESHOLD || '1000' }}
        run: python scripts/delete_products.py

      - name: Upload slettefil som artifact
        uses: actions/upload-artifact@v4
        with:
          name: delete-file
          path: output/matrixify_delete.csv
          retention-days: 30

  # ============================================================
  # JOB 2: Auto-deploy (under threshold)
  # ============================================================
  auto-deploy:
    needs: analyze
    if: needs.analyze.outputs.needs_approval == 'false' && needs.analyze.outputs.delete_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download slettefil
        uses: actions/download-artifact@v4
        with:
          name: delete-file
          path: output/

      - name: Commit og push slettefil
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/matrixify_delete.csv
          git commit -m "🗑️ Auto-sletning: ${{ needs.analyze.outputs.delete_count }} produkter ($(date +%Y-%m-%d))"
          git push

  # ============================================================
  # JOB 3: Manuel godkendelse (over threshold)
  # ============================================================
  manual-deploy:
    needs: analyze
    if: needs.analyze.outputs.needs_approval == 'true'
    runs-on: ubuntu-latest
    environment: sletning-godkendelse  # Kræver approval i GitHub

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download slettefil
        uses: actions/download-artifact@v4
        with:
          name: delete-file
          path: output/

      - name: Commit og push slettefil
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/matrixify_delete.csv
          git commit -m "🗑️ Godkendt sletning: ${{ needs.analyze.outputs.delete_count }} produkter ($(date +%Y-%m-%d))"
          git push

  # ============================================================
  # JOB 4: Status notifikation
  # ============================================================
  notify:
    needs: [analyze]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send status summary
        run: |
          echo "## 📊 Daglig Sletning Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Værdi |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Feed produkter | ${{ needs.analyze.outputs.feed_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shopify produkter | ${{ needs.analyze.outputs.shopify_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Slettes** | **${{ needs.analyze.outputs.delete_count }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Kræver godkendelse | ${{ needs.analyze.outputs.needs_approval }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.analyze.outputs.needs_approval }}" == "true" ]; then
            echo "⚠️ **OVER THRESHOLD** - Godkend venligst i Environments" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Under threshold - kørte automatisk" >> $GITHUB_STEP_SUMMARY
          fi
