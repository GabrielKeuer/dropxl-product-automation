name: Daglig Produkt Sletning

on:
  schedule:
    - cron: '0 4 * * *'  # Kl. 04:00 UTC (05:00/06:00 dansk tid)
  workflow_dispatch:  # Manuel trigger fra GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  # ============================================================
  # JOB 1: Analyser og generer slettefil
  # ============================================================
  analyze:
    runs-on: ubuntu-latest
    outputs:
      delete_count: ${{ steps.run_script.outputs.delete_count }}
      needs_approval: ${{ steps.run_script.outputs.needs_approval }}
      feed_count: ${{ steps.run_script.outputs.feed_count }}
      shopify_count: ${{ steps.run_script.outputs.shopify_count }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer dependencies
        run: pip install pandas requests openpyxl

      - name: Kør slette-analyse
        id: run_script
        env:
          FEED_URL: ${{ vars.FEED_URL }}
          SHOPIFY_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          DELETE_THRESHOLD: ${{ vars.DELETE_THRESHOLD || '1000' }}
        run: python scripts/delete_products.py

      - name: Upload slettefil som artifact
        uses: actions/upload-artifact@v4
        with:
          name: delete-file
          path: output/matrixify_delete.csv
          retention-days: 30

  # ============================================================
  # JOB 2: Godkendelse (kun hvis over threshold)
  # ============================================================
  approval:
    needs: analyze
    if: needs.analyze.outputs.needs_approval == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Vent på manuel godkendelse
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.repository_owner }}
          minimum-approvals: 1
          issue-title: "⚠️ Sletning af ${{ needs.analyze.outputs.delete_count }} produkter kræver godkendelse"
          issue-body: |
            ## Daglig sletning - Threshold overskredet

            | Metric | Værdi |
            |--------|-------|
            | Feed produkter | ${{ needs.analyze.outputs.feed_count }} |
            | Shopify produkter | ${{ needs.analyze.outputs.shopify_count }} |
            | **Skal slettes** | **${{ needs.analyze.outputs.delete_count }}** |
            | Threshold | ${{ vars.DELETE_THRESHOLD || '1000' }} |

            ---

            **Kommenter `approved` for at godkende sletningen.**
            **Kommenter `denied` for at afvise.**

  # ============================================================
  # JOB 3: Deploy (auto hvis under threshold, efter approval hvis over)
  # ============================================================
  deploy:
    needs: [analyze, approval]
    if: |
      always() &&
      needs.analyze.result == 'success' &&
      needs.analyze.outputs.delete_count != '0' &&
      (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download slettefil
        uses: actions/download-artifact@v4
        with:
          name: delete-file
          path: output/

      - name: Commit og push slettefil
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/matrixify_delete.csv
          git diff --staged --quiet && echo "Ingen ændringer" && exit 0
          git commit -m "🗑️ Sletning: ${{ needs.analyze.outputs.delete_count }} produkter ($(date +%Y-%m-%d))"
          git push

  # ============================================================
  # JOB 4: Status summary
  # ============================================================
  notify:
    needs: [analyze, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Status summary
        run: |
          echo "## 📊 Daglig Sletning Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Værdi |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Feed produkter | ${{ needs.analyze.outputs.feed_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shopify produkter | ${{ needs.analyze.outputs.shopify_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Slettes** | **${{ needs.analyze.outputs.delete_count }}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.analyze.outputs.needs_approval }}" == "true" ]; then
            echo "⚠️ **OVER THRESHOLD** - Godkendelse påkrævet via issue" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Under threshold - kørte automatisk" >> $GITHUB_STEP_SUMMARY
          fi
