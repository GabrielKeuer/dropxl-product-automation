name: Daglig Produkt Sletning

on:
  schedule:
    - cron: '10 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-toggle:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check automation toggle
        id: check
        run: |
          ENABLED="${{ vars.AUTOMATION_ENABLED || 'true' }}"
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          if [ "$ENABLED" != "true" ]; then
            echo "⚠️ Automation er slået fra (AUTOMATION_ENABLED=$ENABLED)"
          fi

  analyze:
    needs: check-toggle
    if: needs.check-toggle.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    outputs:
      delete_count: ${{ steps.run.outputs.delete_count }}
      needs_approval: ${{ steps.run.outputs.needs_approval }}
      feed_count: ${{ steps.run.outputs.feed_count }}
      shopify_count: ${{ steps.run.outputs.shopify_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pandas requests openpyxl
      - name: Kør slette-analyse
        id: run
        env:
          FEED_URL: ${{ vars.FEED_URL }}
          SHOPIFY_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          DELETE_THRESHOLD: ${{ vars.DELETE_THRESHOLD || '1000' }}
        run: python scripts/delete_products.py
      - uses: actions/upload-artifact@v4
        with:
          name: delete-file
          path: output/matrixify_delete.csv
          retention-days: 30

  approval:
    needs: analyze
    if: needs.analyze.outputs.needs_approval == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Vent på godkendelse
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.repository_owner }}
          minimum-approvals: 1
          issue-title: "⚠️ Sletning af ${{ needs.analyze.outputs.delete_count }} produkter kræver godkendelse"
          issue-body: |
            ## Threshold overskredet

            | Metric | Værdi |
            |--------|-------|
            | Feed | ${{ needs.analyze.outputs.feed_count }} |
            | Shopify | ${{ needs.analyze.outputs.shopify_count }} |
            | **Slettes** | **${{ needs.analyze.outputs.delete_count }}** |

            Kommenter `approved` eller `denied`.

  deploy:
    needs: [analyze, approval]
    if: |
      always() &&
      needs.analyze.result == 'success' &&
      needs.analyze.outputs.delete_count != '0' &&
      (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: delete-file
          path: output/
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/matrixify_delete.csv
          git diff --staged --quiet && echo "Ingen ændringer" && exit 0
          git commit -m "🗑️ Sletning: ${{ needs.analyze.outputs.delete_count }} produkter ($(date +%Y-%m-%d))"
          git pull --rebase
          git push

  notify:
    needs: [check-toggle, analyze, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🗑️ Daglig Sletning" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.check-toggle.outputs.enabled }}" != "true" ]; then
            echo "⏸️ **Automation slået fra**" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Metric | Værdi |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Feed | ${{ needs.analyze.outputs.feed_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Shopify | ${{ needs.analyze.outputs.shopify_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Slettes** | **${{ needs.analyze.outputs.delete_count }}** |" >> $GITHUB_STEP_SUMMARY
          fi
