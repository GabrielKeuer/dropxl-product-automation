name: Daglig Produkt Oprettelse

on:
  schedule:
    - cron: '20 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-toggle:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check automation toggle
        id: check
        run: |
          ENABLED="${{ vars.AUTOMATION_ENABLED || 'true' }}"
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          if [ "$ENABLED" != "true" ]; then
            echo "⚠️ Automation er slået fra (AUTOMATION_ENABLED=$ENABLED)"
          fi

  create:
    needs: check-toggle
    if: needs.check-toggle.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    outputs:
      product_count: ${{ steps.run.outputs.product_count }}
      variant_count: ${{ steps.run.outputs.variant_count }}
      row_count: ${{ steps.run.outputs.row_count }}
      merge_count: ${{ steps.run.outputs.merge_count }}
      new_count: ${{ steps.run.outputs.new_count }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pandas requests openpyxl beautifulsoup4
      - name: Kør produkt oprettelse
        id: run
        env:
          FEED_URL: ${{ vars.FEED_URL }}
          SHOPIFY_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          MAX_PRODUCTS_PER_RUN: ${{ vars.MAX_PRODUCTS_PER_RUN || '50' }}
        run: python scripts/create_products.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/matrixify_create.csv
          git diff --staged --quiet && echo "Ingen ændringer" && exit 0
          git commit -m "✨ Oprettelse: ${{ steps.run.outputs.new_count }} nye + ${{ steps.run.outputs.merge_count }} merge, ${{ steps.run.outputs.variant_count }} varianter ($(date +%Y-%m-%d))"
          git push

  notify:
    needs: [check-toggle, create]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## ✨ Daglig Oprettelse" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.check-toggle.outputs.enabled }}" != "true" ]; then
            echo "⏸️ **Automation slået fra**" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Metric | Værdi |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Nye produkter | ${{ needs.create.outputs.new_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Merge | ${{ needs.create.outputs.merge_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Varianter | ${{ needs.create.outputs.variant_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Rækker | ${{ needs.create.outputs.row_count }} |" >> $GITHUB_STEP_SUMMARY
          fi
